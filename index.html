<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe Crypto Portfolio | Business Panel</title>
    <style>
        :root { --gold: #f3ba2f; --dark: #0b0e11; --card: #181a20; --text: #eaecef; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 0; }
        
        nav { background: var(--card); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--gold); }
        .menu select { background: #2b2f36; color: white; border: 1px solid var(--gold); padding: 5px; border-radius: 5px; }

        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 1.2rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: #707a8a; text-align: left; font-size: 0.8rem; padding: 10px; }
        td { padding: 12px 10px; border-bottom: 1px solid #2b2f36; }
        .symbol { font-weight: bold; color: var(--gold); }
        
        .btn-action { background: var(--gold); color: black; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; display: block; text-align: center; margin-top: 15px; border: none; cursor: pointer; width: 100%; }
        .btn-action:hover { background: #dba321; }

        input, select { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #333; background: #2b2f36; color: white; box-sizing: border-box; }
        #msgEstado { margin-top: 10px; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">JOE PORTFOLIO PRO</div>
        <div class="menu">
            <select id="currencySelector" onchange="updateAll()">
                <option value="usd">Dólares (USD)</option>
                <option value="jpy">Yenes (JPY)</option>
            </select>
        </div>
    </nav>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h2>📊 Mercado Global</h2>
                <table>
                    <thead>
                        <tr><th>Moneda</th><th>Precio</th></tr>
                    </thead>
                    <tbody id="market-table">
                        <tr><td class="symbol">BTC</td><td id="market-btc">...</td></tr>
                        <tr><td class="symbol">ETH</td><td id="market-eth">...</td></tr>
                        <tr><td class="symbol">USDT</td><td id="market-usdt">...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2>📦 Mi Inventario (Stock)</h2>
                <table id="inventory-table">
                    <thead>
                        <tr><th>Moneda</th><th>Disponible</th><th>Estado</th></tr>
                    </thead>
                    <tbody id="inventory-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>📝 Realizar Pedido</h2>
            <p style="font-size: 0.9rem; color: #707a8a;">Selecciona la moneda y cantidad. Te contactaremos por email para finalizar la transacción legalmente.</p>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <input type="email" id="userEmail" placeholder="Tu Email">
                <select id="cryptoSelect">
                    <option value="BTC">Bitcoin</option>
                    <option value="ETH">Ethereum</option>
                    <option value="USDT">USDT</option>
                </select>
                <input type="number" id="amount" placeholder="Cantidad">
            </div>
            <button onclick="enviarAlExcel()" class="btn-action">Enviar Solicitud de Compra</button>
            <p id="msgEstado"></p>
        </div>
    </div>

    <script>
        const currencySymbols = { usd: '$', jpy: '¥' };
        const csvURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRIQHId0mM1ypZFOCmjB9eey3HT7LzOPWgqUu85yj-ClsFNy1y7vjI72wCDkRWNZn3AYvTnk6Pk8qGw/pub?output=csv';
        const scriptURL = 'https://script.google.com/macros/s/170uxITq0DVDa5p-mb0eWQl4Lk_ITKGDIZGLWraw2SbReK0f9HCgulxx2/exec';

        async function updateMarketPrices() {
            const curr = document.getElementById('currencySelector').value;
            const sym = currencySymbols[curr];
            try {
                const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether&vs_currencies=${curr}`);
                const data = await res.json();
                document.getElementById('market-btc').innerText = sym + ' ' + data.bitcoin[curr].toLocaleString();
                document.getElementById('market-eth').innerText = sym + ' ' + data.ethereum[curr].toLocaleString();
                document.getElementById('market-usdt').innerText = sym + ' ' + data.tether[curr].toLocaleString();
            } catch (e) { console.error("Error Mercado"); }
        }

        async function loadInventory() {
            try {
                const res = await fetch(csvURL);
                const data = await res.text();
                const rows = data.split('\n').slice(1); // Ignora el encabezado
                let html = '';
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 3) {
                        html += `<tr><td class="symbol">${cols[1]}</td><td>${cols[2]}</td><td><span style="color:#00ff88">Disponible</span></td></tr>`;
                    }
                });
                document.getElementById('inventory-body').innerHTML = html;
            } catch (e) { console.error("Error Inventario"); }
        }

        async function enviarAlExcel() {
            const btn = document.querySelector('.btn-action');
            const status = document.getElementById('msgEstado');
            const email = document.getElementById('userEmail').value;
            if(!email) { alert("Pon tu email"); return; }
            
            btn.innerText = "Enviando...";
            const pedido = {
                email: email,
                moneda: document.getElementById('cryptoSelect').value,
                cantidad: document.getElementById('amount').value,
                tipo: 'Compra'
            };

            try {
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(pedido) });
                status.innerText = "✅ Solicitud enviada. Revisa tu email pronto.";
                status.style.color = "#00ff88";
            } catch (e) {
                status.innerText = "❌ Error al enviar.";
                status.style.color = "#ff4444";
            }
            btn.innerText = "Enviar Solicitud de Compra";
        }

        function updateAll() {
            updateMarketPrices();
            loadInventory();
        }

        updateAll();
        setInterval(updateAll, 60000); // Actualiza todo cada minuto
    </script>
</body>
</html>
